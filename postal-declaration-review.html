<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ECT Postal Vote — Declaration Review</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f1117;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
      -webkit-user-select: none;
      user-select: none;
    }

    #auth-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      width: 100%;
    }

    .auth-card {
      background: #1a1d27;
      border: 1px solid #2e3147;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .auth-card h1 { font-size: 20px; font-weight: 600; color: #fff; margin-bottom: 6px; }
    .auth-card p  { font-size: 13px; color: #5a6080; margin-bottom: 28px; }

    .auth-card input {
      width: 100%;
      padding: 12px 16px;
      background: #0f1117;
      border: 1px solid #2e3147;
      border-radius: 10px;
      color: #e8e8e8;
      font-size: 15px;
      text-align: center;
      letter-spacing: 0.1em;
      margin-bottom: 14px;
      outline: none;
      -webkit-user-select: text;
      user-select: text;
    }

    .auth-card input:focus { border-color: #4f6ef7; }
    .auth-error   { font-size: 13px; color: #eb5757; margin-bottom: 12px; display: none; }
    .auth-loading { font-size: 13px; color: #5a6080; margin-bottom: 12px; display: none; }

    #main-screen { display: none; width: 100%; max-width: 900px; }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .top-bar h1 { font-size: 18px; font-weight: 600; color: #fff; }

    .stats { display: flex; gap: 10px; }

    .stat {
      background: #1a1d27;
      border: 1px solid #2e3147;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 13px;
      color: #9ba3c4;
    }

    .stat span             { font-weight: 600; color: #fff; margin-left: 4px; }
    .stat.accepted span    { color: #6fcf97; }
    .stat.denied span      { color: #eb5757; }

    .ballot-card {
      background: #1a1d27;
      border: 1px solid #2e3147;
      border-radius: 16px;
      padding: 28px;
      width: 100%;
      margin-bottom: 16px;
    }

    .ballot-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .ballot-id    { font-size: 12px; color: #3a3f58; font-family: monospace; letter-spacing: 0.05em; }
    .ballot-label { font-size: 12px; color: #5a6080; text-transform: uppercase; letter-spacing: 0.06em; }

    .declaration-wrap {
      position: relative;
      overflow: hidden;
      width: 100%;
      aspect-ratio: 1 / 1.75;
      background: #0f1117;
      border: 1px solid #2e3147;
      border-radius: 10px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .declaration-wrap img {
      position: absolute;
      left: -100%;
      width: 200%;
      max-width: none;
      top: 0;
      pointer-events: none;   /* blocks drag */
      -webkit-user-drag: none;
      user-drag: none;
    }

    /* Transparent overlay — sits on top of image, blocks right-click on the img itself */
    .declaration-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 10;
      cursor: default;
    }

    .loading-text { color: #3a3f58; font-size: 14px; }

    .btn-row { display: flex; gap: 12px; }

    .btn {
      flex: 1;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      letter-spacing: 0.02em;
    }

    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-accept { background: #1a3d2b; color: #6fcf97; border: 1px solid #1f4a2e; }
    .btn-accept:hover:not(:disabled) { background: #1f4a35; }

    .btn-deny { background: #3d1a1a; color: #eb5757; border: 1px solid #4a1f1f; }
    .btn-deny:hover:not(:disabled) { background: #4a2020; }

    .empty-state { text-align: center; padding: 80px 20px; color: #3a3f58; }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state h2 { font-size: 18px; color: #5a6080; margin-bottom: 8px; }
    .empty-state p  { font-size: 14px; }

    .btn-primary {
      width: 100%;
      padding: 13px;
      background: #4f6ef7;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-primary:hover { background: #3d5ce0; }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1d27;
      border: 1px solid #2e3147;
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 14px;
      color: #9ba3c4;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card">
    <h1>Declaration Review</h1>
    <p>ECT Electoral Commission — Authorised staff only</p>
    <input type="password" id="passInput" placeholder="Enter passphrase" />
    <div class="auth-error"   id="authError">Incorrect passphrase. Try again.</div>
    <div class="auth-loading" id="authLoading">Verifying…</div>
    <button class="btn-primary" id="enterBtn" onclick="checkPass()">Enter</button>
  </div>
</div>

<div id="main-screen">
  <div class="top-bar">
    <h1>Declaration Review</h1>
    <div class="stats">
      <div class="stat">Pending <span id="statPending">0</span></div>
      <div class="stat accepted">Accepted <span id="statAccepted">0</span></div>
      <div class="stat denied">Denied <span id="statDenied">0</span></div>
    </div>
  </div>
  <div id="ballotList"></div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp }
    from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getStorage, ref, listAll, getDownloadURL, getMetadata }
    from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";
  import { getFunctions, httpsCallable }
    from "https://www.gstatic.com/firebasejs/12.11.0/firebase-functions.js";
  import { getRemoteConfig, fetchAndActivate, getValue }
    from "https://www.gstatic.com/firebasejs/12.11.0/firebase-remote-config.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCc_sDCpf_2N8BbJLa-GLLdGaO97KnOkPs",
    authDomain: "ect-postal-votes.firebaseapp.com",
    databaseURL: "https://ect-postal-votes-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "ect-postal-votes",
    storageBucket: "ect-postal-votes.firebasestorage.app",
    messagingSenderId: "882538370470",
    appId: "1:882538370470:web:d4d22c0ddc38dd2f172b67"
  };

  const app          = initializeApp(firebaseConfig);
  const storage      = getStorage(app);
  const functions    = getFunctions(app, "us-east1");
  const remoteConfig = getRemoteConfig(app);

  remoteConfig.settings.minimumFetchIntervalMillis = 3600000;
  remoteConfig.defaultConfig = { review_passphrase: "" };

  let passphrase = "";
  let stats = { pending: 0, accepted: 0, denied: 0 };

  const remoteConfigReady = (async () => {
    try {
      await fetchAndActivate(remoteConfig);
      passphrase = getValue(remoteConfig, "review_passphrase").asString();
    } catch (err) {
      console.error("Remote Config fetch failed:", err);
    }
  })();

  // ── Block right-click, Save As, and common download shortcuts ────────────
  document.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('keydown', e => {
    // Block Cmd+S / Ctrl+S (Save), Cmd+Shift+S, Cmd+P (Print)
    if ((e.metaKey || e.ctrlKey) && ['s', 'p'].includes(e.key.toLowerCase())) {
      e.preventDefault();
    }
  });

  // ── Auth ──────────────────────────────────────────────────────────────────
  window.checkPass = async function() {
    const input       = document.getElementById('passInput').value.trim();
    const enterBtn    = document.getElementById('enterBtn');
    const authLoading = document.getElementById('authLoading');
    const authError   = document.getElementById('authError');

    enterBtn.disabled = true;
    authLoading.style.display = 'block';
    authError.style.display   = 'none';

    await remoteConfigReady;

    if (input === passphrase && passphrase !== "") {
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('main-screen').style.display = 'block';
      loadPendingBallots();
    } else {
      authError.style.display   = 'block';
      authLoading.style.display = 'none';
      enterBtn.disabled = false;
      document.getElementById('passInput').value = '';
    }
  };

  document.getElementById('passInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') window.checkPass();
  });

  // ── Load pending ballots ──────────────────────────────────────────────────
  async function loadPendingBallots() {
    const listRef = ref(storage, 'pending/');
    const list    = await listAll(listRef);

    const scrubbed = [];
    for (const item of list.items) {
      try {
        const meta = await getMetadata(item);
        if (meta.customMetadata && meta.customMetadata.exifScrubbed === 'true') {
          scrubbed.push(item);
        }
      } catch (e) {
        console.warn('Could not get metadata for', item.name, e);
      }
    }

    stats.pending = scrubbed.length;
    updateStats();

    const listEl = document.getElementById('ballotList');

    if (scrubbed.length === 0) {
      listEl.innerHTML = `
        <div class="empty-state">
          <div class="icon">🗳</div>
          <h2>No pending ballots</h2>
          <p>All declarations have been reviewed, or no ballots have been submitted yet.</p>
        </div>`;
      return;
    }

    for (const item of scrubbed) {
      const url = await getDownloadURL(item);
      renderBallotCard(item.name, url, listEl);
    }
  }

  // ── Render ballot card (right half only via CSS) ──────────────────────────
  function renderBallotCard(filename, url, container) {
    const shortId = filename.replace('pending/', '').split('.')[0].split('-')[0].toUpperCase();

    const card = document.createElement('div');
    card.className = 'ballot-card';
    card.id = `card-${filename.replace('pending/', '').replace('.', '-')}`;
    card.innerHTML = `
      <div class="ballot-header">
        <span class="ballot-label">Declaration side only</span>
        <span class="ballot-id">REF: ${shortId}</span>
      </div>
      <div class="declaration-wrap" id="wrap-${shortId}">
        <span class="loading-text">Loading…</span>
      </div>
      <div class="btn-row">
        <button class="btn btn-accept" id="accept-${shortId}"
          onclick="handleDecision('${filename}', '${shortId}', 'accept')">✓ Accept</button>
        <button class="btn btn-deny" id="deny-${shortId}"
          onclick="handleDecision('${filename}', '${shortId}', 'deny')">✗ Deny</button>
      </div>
    `;
    container.appendChild(card);

    const wrap = document.getElementById(`wrap-${shortId}`);
    const img = new Image();
    img.onload = () => {
      wrap.innerHTML = '';
      img.draggable = false;
      wrap.appendChild(img);
    };
    img.onerror = () => {
      wrap.innerHTML = '<span class="loading-text">Failed to load image.</span>';
    };
    img.src = url;
  }

  // ── Accept / Deny ─────────────────────────────────────────────────────────
  window.handleDecision = async function(filename, shortId, decision) {
    const acceptBtn = document.getElementById(`accept-${shortId}`);
    const denyBtn   = document.getElementById(`deny-${shortId}`);

    acceptBtn.disabled = denyBtn.disabled = true;
    if (decision === 'accept') acceptBtn.textContent = 'Processing…';
    else                       denyBtn.textContent   = 'Processing…';

    try {
      const processBallot = httpsCallable(functions, 'processBallot');
      await processBallot({ filename, decision });

      stats.pending = Math.max(0, stats.pending - 1);
      if (decision === 'accept') { stats.accepted++; showToast(`✓ Ballot ${shortId} accepted`); }
      else                       { stats.denied++;   showToast(`✗ Ballot ${shortId} denied`);   }
      updateStats();

      const card = document.getElementById(
        `card-${filename.replace('pending/', '').replace('.', '-')}`
      );
      card.style.transition = 'opacity 0.4s';
      card.style.opacity = '0';
      setTimeout(() => {
        card.remove();
        if (stats.pending === 0 && document.getElementById('ballotList').children.length === 0) {
          document.getElementById('ballotList').innerHTML = `
            <div class="empty-state">
              <div class="icon">✓</div>
              <h2>All done</h2>
              <p>All pending declarations have been reviewed.</p>
            </div>`;
        }
      }, 400);

    } catch (err) {
      console.error('Decision failed:', err);
      acceptBtn.disabled = denyBtn.disabled = false;
      acceptBtn.textContent = '✓ Accept';
      denyBtn.textContent   = '✗ Deny';
      showToast('Error processing ballot. Try again.');
    }
  };

  // ── Helpers ───────────────────────────────────────────────────────────────
  function updateStats() {
    document.getElementById('statPending').textContent  = stats.pending;
    document.getElementById('statAccepted').textContent = stats.accepted;
    document.getElementById('statDenied').textContent   = stats.denied;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
